<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>KV Board</title>
    <script>
        let username;   // Global variable to store the username
        let flaskSiteUrl = 'https://kvstore.mooc.ca';  // Base URL of your identity server
        let accounts = [];
       </script> <!-- Global variable to store accounts, filled by kvstore.js -->
    <script>

        let currentMode = 'add';
        let currentSchema = null;

        // Build form fields dynamically from schema into #form-fields.
        // mode: 'create' (all fields editable) or 'edit' (respects field.editable)
        // data: object of existing values; use '_key' for the kvstore key
        function buildFormFields(schema, mode, data) {
            const container = document.getElementById('form-fields');
            container.innerHTML = '';
            currentSchema = schema;

            // kvKey field — editable on create, display-only on edit
            container.appendChild(makeFieldRow(
                { key: '_key', label: schema.kvKey.label, inputType: 'text',
                  placeholder: schema.kvKey.placeholder, editable: false, default: '' },
                mode,
                data['_key'] || ''
            ));

            // Schema-defined fields
            for (const field of schema.fields) {
                const value = (data[field.key] != null) ? data[field.key] : (field.default || '');
                container.appendChild(makeFieldRow(field, mode, value));
            }
        }

        // Render a single label+input row. editable:false fields show as text in edit mode.
        function makeFieldRow(field, mode, value) {
            const wrapper = document.createElement('div');

            const label = document.createElement('label');
            label.textContent = field.label;
            wrapper.appendChild(label);

            const isEditable = (mode === 'create') || field.editable;

            if (field.inputType === 'oauth') {
                const display = document.createElement('div');
                display.className = 'field-display';
                display.textContent = value ? '(token stored)' : '(no token)';
                wrapper.appendChild(display);
                const hidden = document.createElement('input');
                hidden.type = 'hidden';
                hidden.id = field.key + 'Input';
                hidden.value = value || '';
                wrapper.appendChild(hidden);
                if (mode === 'edit') {
                    const btn = document.createElement('button');
                    btn.type = 'button';
                    btn.className = 'kv-action-btn kv-save-btn';
                    btn.textContent = 'Re-authorize';
                    btn.style.marginTop = '4px';
                    btn.onclick = () => {
                        const keyEl   = document.getElementById('_keyInput');
                        const titleEl = document.getElementById('titleInput');
                        const permEl  = document.getElementById('permissionsInput');
                        window.top.mastodonOAuthStart(
                            titleEl ? titleEl.value : (keyEl ? keyEl.value : ''),
                            keyEl   ? keyEl.value   : '',
                            permEl  ? permEl.value  : 'rw'
                        );
                    };
                    wrapper.appendChild(btn);
                }
            } else if (isEditable) {
                const input = document.createElement('input');
                input.type = field.inputType === 'password' ? 'password' : 'text';
                input.id = field.key + 'Input';
                input.placeholder = field.placeholder || '';
                input.value = value || '';
                wrapper.appendChild(input);
            } else {
                const display = document.createElement('div');
                display.className = 'field-display';
                display.textContent = value || '';
                wrapper.appendChild(display);
                const hidden = document.createElement('input');
                hidden.type = 'hidden';
                hidden.id = field.key + 'Input';
                hidden.value = value || '';
                wrapper.appendChild(hidden);
            }

            return wrapper;
        }

        async function addOrUpdateKeyValue() {
            if (!currentSchema) { alert('No account type selected.'); return; }
            const token = getSiteSpecificCookie(flaskSiteUrl, 'access_token');

            const keyEl = document.getElementById('_keyInput');
            const key = keyEl ? keyEl.value.trim() : '';
            if (!key) { alert('Please enter a value for "' + currentSchema.kvKey.label + '".'); return; }

            // Build instanceData from schema
            const instanceData = { type: currentSchema.type };
            if (currentSchema.instanceFromKey) instanceData.instance = key;
            for (const field of currentSchema.fields) {
                const el = document.getElementById(field.key + 'Input');
                instanceData[field.key] = el ? el.value : (field.default || '');
            }
            if (!instanceData.title) { alert('Please enter a Title.'); return; }

            let encryptedValue;
            try {
                const encKey = await window.parent.getEncKey(flaskSiteUrl);
                if (!encKey) throw new Error('Encryption key not found — please log in again.');
                encryptedValue = await encryptWithKey(encKey, JSON.stringify(instanceData));
            } catch (err) {
                console.error('Encryption error:', err);
                alert('Failed to encrypt data');
                return;
            }

            const matchingAccount = accounts.find(account => account.key === key);
            const endpoint = matchingAccount ? 'update_kv/' : 'add_kv/';

            fetch(`${flaskSiteUrl}/${endpoint}`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + token },
                body: JSON.stringify({ key: key, value: encryptedValue })
            })
            .then(response => response.json())
            .then(() => {
                (async () => {
                    try {
                        accounts = await window.parent.getAccounts(flaskSiteUrl);
                        window.parent.populatePostOptions(accounts);
                    } catch (error) {
                        console.error('Error fetching accounts:', error);
                    } finally {
                        closeForm();
                        getSite(flaskSiteUrl);
                    }
                })();
            })
            .catch(error => alert('Error saving account: ' + error));
        }

        async function setFormValues(targetKey) {
            const matchingAccount = accounts.find(account => account.key === targetKey);
            if (!matchingAccount) { alert("Can't find account: " + targetKey); return; }
            const valueData = JSON.parse(matchingAccount.value);

            const schema = window.parent.accountSchemas && window.parent.accountSchemas[valueData.type];
            if (!schema) { alert('No schema for account type: ' + (valueData.type || 'unknown')); return; }

            buildFormFields(schema, 'edit', { _key: targetKey, ...valueData });

            currentMode = 'update';
            document.getElementById('submitBtn').textContent = 'Update Account';
            document.getElementById('deleteBtn').style.display = 'inline';
            formDirty = false;
        }

        let formDirty = false;
        function markDirty() { formDirty = true; }

        // Close form with unsaved-changes check. Returns true if form was closed.
        async function tryCloseForm() {
            if (!formDirty) { closeForm(); return true; }
            if (confirm('You have unsaved changes. Save them?')) {
                await addOrUpdateKeyValue();
            } else if (confirm('Discard changes and close?')) {
                closeForm();
                return true;
            }
            return false;
        }

        function closeForm() {
            const form = document.getElementById('sharedForm');
            form.style.display = 'none';
            form.dataset.openFor = '';
            formDirty = false;
            // Return form to its home position so getSite() rebuilding #kvList doesn't destroy it
            const header = document.getElementById('add-account-header');
            if (header && header.parentNode) {
                header.parentNode.insertBefore(form, header);
            }
        }

        async function openEdit(key, item) {
            const form = document.getElementById('sharedForm');
            if (form.dataset.openFor === key && form.style.display !== 'none') {
                await tryCloseForm(); return;
            }
            if (form.style.display !== 'none' && formDirty) {
                const closed = await tryCloseForm();
                if (!closed) return;
            }
            item.parentNode.insertBefore(form, item.nextSibling);
            form.dataset.openFor = key;
            form.style.display = 'block';
            form.scrollIntoView({ behavior: 'smooth', block: 'start' });
            setFormValues(key);
        }

        async function openAdd(btn) {
            if (document.getElementById('sharedForm').style.display !== 'none' && formDirty) {
                const closed = await tryCloseForm();
                if (!closed) return;
            }
            closeForm();
            document.getElementById('kvList').style.display = 'none';
            showTypePicker();
        }

        function showTypePicker() {
            const flow = document.getElementById('add-flow');
            flow.innerHTML = `
                <h3 style="margin:0 0 8px;">Add Account</h3>
                <div id="type-picker-buttons">
                    <button class="kv-name-btn" style="margin:3px;width:auto;" onclick="selectAccountType('Mastodon')">Mastodon</button>
                    <button class="kv-name-btn" style="margin:3px;width:auto;" onclick="selectAccountType('Bluesky')">Bluesky</button>
                    <button class="kv-name-btn" style="margin:3px;width:auto;" onclick="selectAccountType('WordPress')">WordPress</button>
                    <button class="kv-name-btn" style="margin:3px;width:auto;" onclick="selectAccountType('OPML')">OPML</button>
                    <button class="kv-name-btn" style="margin:3px;width:auto;" onclick="selectAccountType('Blogger')">Blogger</button>
                    <button class="kv-name-btn" style="margin:3px;width:auto;" onclick="selectAccountType('Etherpad')">Etherpad</button>
                    <button class="kv-name-btn" style="margin:3px;width:auto;" onclick="selectAccountType('AI')">AI</button>
                    <button class="kv-name-btn" style="margin:3px;width:auto;" onclick="selectAccountType('Proxyp')">Proxyp</button>
                </div>
                <div class="kv-action-buttons" style="margin-top:8px;">
                    <button class="kv-action-btn kv-cancel-btn" onclick="cancelAdd()">Cancel</button>
                </div>`;
            flow.style.display = 'block';
        }

        function selectAccountType(type) {
            if (type === 'Mastodon') {
                const flow = document.getElementById('add-flow');
                flow.innerHTML = `
                    <h3 style="margin:0 0 8px;">Add Mastodon Account</h3>
                    <label style="font-variant:small-caps;font-size:0.8rem;color:#555;">Username</label>
                    <input type="text" id="mastodon-username-input"
                           placeholder="you@mastodon.social"
                           style="display:block;width:100%;box-sizing:border-box;padding:0.2rem;font-size:0.8rem;margin:2px 0 8px;">
                    <div class="kv-action-buttons">
                        <button class="kv-action-btn kv-save-btn" onclick="submitMastodonUsername()">Authorize with Mastodon</button>
                        <button class="kv-action-btn kv-cancel-btn" onclick="showTypePicker()">Back</button>
                    </div>`;
                return;
            }

            const schema = window.parent.accountSchemas && window.parent.accountSchemas[type];
            if (!schema) { alert('No schema for account type: ' + type); return; }

            cancelAdd();
            buildFormFields(schema, 'create', {});

            const form = document.getElementById('sharedForm');
            const header = document.getElementById('add-account-header');
            header.parentNode.insertBefore(form, header.nextSibling);
            form.dataset.openFor = '__add__';
            form.style.display = 'block';
            form.scrollIntoView({ behavior: 'smooth', block: 'start' });

            currentMode = 'add';
            document.getElementById('submitBtn').textContent = 'Add Account';
            document.getElementById('deleteBtn').style.display = 'none';
            formDirty = false;
        }

        function cancelAdd() {
            document.getElementById('add-flow').style.display = 'none';
            document.getElementById('kvList').style.display = 'block';
        }

        function submitMastodonUsername() {
            const username = document.getElementById('mastodon-username-input').value.trim();
            if (!username.includes('@')) {
                alert('Please enter your username as you@instance.social');
                return;
            }
            window.top.mastodonOAuthStart(username, username, 'rw');
        }

        function resetForm() {
            currentMode = 'add';
            currentSchema = null;
            formDirty = false;
        }

        // Permissions:
        // r  read    w  write    e  edit
        // s  summarize    t  translate    g  generate    p  proxy
       

        function accountIcon(type) {
            if (type === 'Mastodon') {
                const span = document.createElement('span');
                span.className = 'account-icon-img';
                span.setAttribute('aria-label', 'Mastodon');
                return span;
            }
            const materialIcons = {
                'Bluesky':   'cloud',
                'OPML':      'rss_feed',
                'WordPress': 'article',
                'Blogger':   'article',
            };
            const span = document.createElement('span');
            span.className = 'material-icons';
            span.textContent = materialIcons[type] || 'account_circle';
            return span;
        }

        async function getSite(flaskSiteUrl) {
            const token = getSiteSpecificCookie(flaskSiteUrl,'access_token');  // Retrieve the token for the specific Flask site

            try {
                const response = await fetch(`${flaskSiteUrl}/get_kvs/`, {
                    method: 'GET',
                    headers: {
                        'Authorization': 'Bearer ' + token
                    }
                });

                const data = await response.json();
                const kvList = document.getElementById("kvList");
                kvList.innerHTML = '';  // Clear previous entries

                const accountList = document.createElement('div');
                accountList.className = 'account-list';
                const tip = document.createElement('div');
                tip.className = 'account-list-tip';
                tip.textContent = 'Select an account to manage';
                accountList.appendChild(tip);

                for (const kv of data) {
                    let parsedValue = null;
                    try {
                        const encKey = await window.parent.getEncKey(flaskSiteUrl);
                        const decryptedString = await decryptWithKey(encKey, kv.value);
                        parsedValue = decryptedString ? JSON.parse(decryptedString) : null;
                    } catch (error) {
                        console.error(`Error parsing kv.value for key: ${kv.key} ${kv.value}`, error);
                    }

                    const item = document.createElement('div');
                    item.className = 'account-list-item';
                    const button = document.createElement('button');
                    button.className = 'account-button';
                    button.appendChild(accountIcon(parsedValue?.type || ''));
                    const name = document.createElement('span');
                    name.textContent = parsedValue?.title || kv.key;
                    button.appendChild(name);
                    button.onclick = () => openEdit(kv.key, item);
                    item.appendChild(button);
                    accountList.appendChild(item);
                }
                kvList.appendChild(accountList);
            } catch (error) {
                console.error('Error fetching key-value pairs: ' + error);
            }
        }

        
        async function deleteKeyValue() {
            const keyEl = document.getElementById('_keyInput');
            const key = keyEl ? keyEl.value : '';
            const titleEl = document.getElementById('titleInput');
            const title = (titleEl ? titleEl.value : '') || key;
            if (!confirm(`Delete "${title}"? This cannot be undone.`)) return;
            const token = getSiteSpecificCookie(flaskSiteUrl,'access_token');

            if (key) {
                fetch(`${flaskSiteUrl}/delete_kv/`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': 'Bearer '+token  // Include the token in the Authorization header
                    },
                    body: JSON.stringify({ key: key })
                })
                .then(response => response.json())
                .then(async () => {
                    try {
                        accounts = await window.parent.getAccounts(flaskSiteUrl);
                        window.parent.populatePostOptions(accounts);
                    } catch (error) {
                        console.error('Error fetching accounts:', error);
                    } finally {
                        closeForm();
                        getSite(flaskSiteUrl);
                    }
                })
                .catch(error => alert('Error deleting key-value pair: ' + error));
            } else {
                alert('No key specified for deletion.');
            }
        }

        function logout() {
            // Remove the token from localStorage
            deleteSiteSpecificCookie(flaskSiteUrl);  // Clears the token for the specific Flask site

            //localStorage.removeItem('token');
            
            alert('You have been logged out.');

            // Redirect to the login page with the current URL as the 'next' parameter
            const currentUrl = encodeURIComponent(parent.window.location.href);
            // parent.window.location.href = `${flaskSiteUrl}/auth/login?next=${currentUrl}`;
            return;
        }


        function setCookie(name, value, days) {
            let expires = "";
            if (days) {
                const date = new Date();
                date.setTime(date.getTime() + (days * 24 * 60 * 60 * 1000));
                expires = "; expires=" + date.toUTCString();
            }
            document.cookie = name + "=" + (value || "") + expires + "; path=/; Secure; SameSite=None";
        }

        function getCookie(name) {
            const value = `; ${document.cookie}`;
            const parts = value.split(`; ${name}=`);
            if (parts.length === 2) return parts.pop().split(';').shift();
        }

        // Site Specific Cookies

        function deriveSiteIdentifier(flaskSiteUrl) {
            if (!flaskSiteUrl) { alert('No flaskSiteUrl provided'); console.error("No flask site URL provided."); } //
            return new URL(flaskSiteUrl).hostname.replace(/\./g, '_');
        }

        function setSiteSpecificCookie(flaskSiteUrl, name, value, days) {
            setCookie(`${name}_${deriveSiteIdentifier(flaskSiteUrl)}`, value, days);
        }

        function getSiteSpecificCookie(flaskSiteUrl, name) {
            return getCookie(`${name}_${deriveSiteIdentifier(flaskSiteUrl)}`);
        }

        function deleteSiteSpecificCookie(flaskSiteUrl, name) {
            setCookie(`${name}_${deriveSiteIdentifier(flaskSiteUrl)}`, '', -1);
        }


        function isTokenExpired(token) {
            // Token is now opaque (username:hex32), not a JWT — check the expiry cookie.
            if (!token) return true;
            const expires = getSiteSpecificCookie(flaskSiteUrl, 'token_expires');
            if (!expires) return false;
            return new Date(expires) < new Date();
        }

        document.addEventListener('DOMContentLoaded', async function() {
            async function initializePage() { 
                // Function to get a parameter from the URL by name
                // localStorage.setItem('username', 'merle');
                //    alert('set item');
                function getParamFromUrl(name) {
                    const urlParams = new URLSearchParams(window.location.search);
                    return urlParams.get(name);
                }

                // Get the Token from the URL (which means we just logged in)
                const token = getParamFromUrl('token');
                // If we got the token from the URL, set it as a cookie for next time
                if (token) {
                    setSiteSpecificCookie(flaskSiteUrl, 'access_token', token, 1);
                    console.log("Token cookie set from login");
                }

                // Get the usename from the URL (which means we just logged in)
                let username = getParamFromUrl('username');
                console.log("Username from URL: "+username);
                // Otherwise, try to get the username from local storage
                username = username ?? localStorage.getItem('username');
                console.log("Username from local storage: "+username);

                // If we have a username, we will store it in local storage
                if (username) { 
                    localStorage.setItem('username', username);
                    console.log("Username set in local storage: "+username);
                } else {
                    // If we don't have a username by now we're going to need to login
                    alert("Please login.");
                }



                // Store the token and username in localStorage if they're present in the URL





                if (token) {
                    setSiteSpecificCookie(flaskSiteUrl, 'access_token',  token, 1);
                    // localStorage.setItem('token', token);
                }



                if (token || username) {
                    history.replaceState({}, document.title, window.location.pathname);
                }

                // Proceed with other actions, e.g., fetching key-value pairs
                if (getSiteSpecificCookie(flaskSiteUrl,'access_token')) {
                        resetForm(); // Reset form to default state
                        try { // Refresh the key-value list
                            accounts = await window.parent.getAccounts(flaskSiteUrl);
                            console.log('Accounts fetched from flasker.html event listener:', accounts);
                        } catch (error) {
                            console.error('Error fetching accounts:', error);
                        }
                    
                } else {
                    console.error('Token not found. Redirecting to login page.');
                    //window.location.href = `${flaskSiteUrl}/auth/login?next=${encodeURIComponent(window.location.href)}`;
                    return;
                }

                if (isTokenExpired(getSiteSpecificCookie(flaskSiteUrl,'access_token'))) {
                    console.error('Token expired. Redirecting to login page.');
                    //alert("Token expired. Please login.");
                    //window.location.href = `${flaskSiteUrl}/auth/login?next=${encodeURIComponent(window.location.href)}`;
                    return;
                }

                getSite(flaskSiteUrl);  // Fetch key-value pairs from the Flask site
            }
            await initializePage();
            // Mark form dirty whenever any field changes
            document.getElementById('addKvForm').addEventListener('input',  markDirty);
            document.getElementById('addKvForm').addEventListener('change', markDirty);
        });

        <style>
            body {
                width: 100%;
                font-family: Arial, sans-serif;
                line-height: 1.6;
                box-sizing: border-box;
                display: block; /* override interface.css flex centering */
            }

            /* Style for the main container */
            .kvcontainer {
                max-width: 400px;
                width: 100%;
                max-height: 100%;
                margin: 0 auto;
                padding: 0px;
                overflow-y: scroll;
                box-sizing: border-box; /* Include padding in the width */
            }


            /* Edit card */
            #sharedForm {
                border: 1px solid #ddd;
                border-radius: 4px;
                padding: 10px;
                margin-top: 6px;
                background: #fafafa;
            }

            /* Form */
            #addKvForm {
                width: 100%;
            }

            /* Labels */
            #addKvForm label {
                margin-bottom: 0; /* Reduce spacing between label and element */
                display: block;
                font-variant: small-caps; /* Keep small caps */
                font-weight: 400; /* Lighter font weight */
                font-size: 0.8rem; /* Slightly smaller font size */
                line-height: 0.8rem; /* Slightly smaller font size */
                color: #555; /* Lighter text color */
            }

            .field-display {
                font-size: 0.8rem;
                color: #444;
                padding: 0.15rem 0;
                margin-bottom: 0.4rem;
            }

            /* Form inputs — scoped to the form, not the account list */
            #addKvForm input,
            .kv-name-btn,
            #add-account-header button {
                display: block;
                margin-top: 2px;
                margin-bottom: 0.5rem;
                padding: 0.2rem;
                width: 100%;
                font-size: 0.8rem;
                box-sizing: border-box;
            }


            #kvList { margin-top: 0.5rem; }

            /* Account name buttons in the list */
            .kv-name-btn {
                text-align: left;
                background: #777;
                color: #fff;
                border: 1px solid #777;
                border-radius: 3px;
                cursor: pointer;
            }
            .kv-name-btn:hover { background: #555; border-color: #555; }

            /* Action buttons (Save / Delete / Cancel) */
            .kv-action-buttons {
                display: flex;
                flex-wrap: wrap;
                gap: 0.3rem;
                margin-top: 0.5rem;
            }
            .kv-action-btn {
                display: inline-block;
                width: auto;
                flex: 0 0 auto;
                padding: 0.15rem 0.5rem;
                border-radius: 3px;
                cursor: pointer;
                font-size: 0.75rem;
                margin: 0;
            }
            .kv-save-btn   { background: var(--highlight-color); color: #fff; border: 1px solid var(--highlight-color); }
            .kv-delete-btn { background: #c44; color: #fff; border: 1px solid #c44; }
            .kv-cancel-btn { background: #888; color: #fff; border: 1px solid #888; }

        </style>
    
</head>
