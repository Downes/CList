<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Authorizing...</title>
    <script src="js/oauth-config.js"></script>
    <script src="js/oauth-strategies.js"></script>
    <script src="js/oauth-client.js"></script>
    <script>
        window.addEventListener('DOMContentLoaded', async () => {
            const msg = document.getElementById('msg');

            const params = new URLSearchParams(window.location.search);

            // HACK: Desktop-local bounce. WordPress requires HTTPS on success_url, so
            // wordpress.js sends https://clist.mooc.ca/callback.html?local_port=PORT.
            // We receive the credentials here and immediately redirect them to the local
            // launcher, which serves the real callback.html that processes them.
            // See the comment in js/wordpress.js for context on why this exists.
            const localPort = params.get('local_port');
            if (localPort && /^\d+$/.test(localPort)) {
                const forwarded = new URLSearchParams(params);
                forwarded.delete('local_port');
                window.location.replace('http://localhost:' + localPort + '/callback.html?' + forwarded);
                return;
            }

            // WordPress Application Passwords callback
            // WordPress redirects here with site_url, user_login, and password as GET params.
            if (params.has('site_url') && params.has('user_login') && params.has('password')) {
                const result = {
                    providerType: 'WordPress',
                    siteUrl:   params.get('site_url'),
                    userLogin: params.get('user_login'),
                    password:  params.get('password'),
                };
                localStorage.setItem('oauth_callback_result', JSON.stringify(result));
                history.replaceState({}, document.title, window.location.pathname);
                window.location.href = '/';
                return;
            }

            // Standard OAuth callback (Mastodon etc.)
            try {
                const result = await OAuthClient.handleCallback();
                if (!result) {
                    msg.textContent = 'No authorization data found in URL.';
                    return;
                }
                localStorage.setItem('oauth_callback_result', JSON.stringify(result));
                history.replaceState({}, document.title, window.location.pathname);
                window.location.href = '/';
            } catch (err) {
                console.error('OAuth callback error:', err);
                msg.textContent = 'Authorization failed: ' + err.message;
            }
        });
    </script>
</head>
<body>
    <p id="msg">Completing authorization, please wait&hellip;</p>
    <p>If this page does not redirect automatically, <a href="/">return to CList</a>.</p>
</body>
</html>
